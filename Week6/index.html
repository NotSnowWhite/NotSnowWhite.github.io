<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Blog</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="@import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap');">
</head>

<body>
    <header>
        <h1>Welcome....</h1>
        <p>Let's blog! This is a simple place to just talk it out.</p>
    </header>
    <nav>
        <ul>
            <li><button type="button" id="themeToggle">Light/Dark</button></li>
            <li><button type="button" id="newPostButton">New Post</button></li>
        </ul>
    </nav>
    <main>
        <h2>Latest Posts</h2>
        <div id="newPosts">

        </div>
    </main>

    <footer>
        <p>&copy; 2026 My Personal Blog. All rights reserved.</p>
    </footer>

    <div id="modal" style="display: none;">
        <div id="modalContent">
            <span id="closeModal">&times;</span>
            <h3>New Post</h3>
            <input type="text" id="postTitle" placeholder="Title">
            <textarea id="postBody" placeholder="What are you thinking...?"></textarea>
            <input type="date" id="postDate">
            <button id="submitPost">Submit</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>

</html>
